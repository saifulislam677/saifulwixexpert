<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TGC Employee Portal | Fully Functional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --sidebar-bg: #05162B; --sidebar-text: #FFFFFF; --main-bg: #F5F7FA;
      --primary: #1E3A5F; --primary-hover: #162d4a; --success: #10B981;
      --danger: #EF4444; --warning: #F59E0B; --border: #E5E7EB;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--main-bg); color: #1F2937; }
    .hidden { display: none !important; }

    /* Auth Styles */
    .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--sidebar-bg); }
    .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    
    /* Layout Styles */
    .app-container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; transition: 0.3s; }
    .main-content { flex: 1; margin-left: 260px; padding: 40px; }
    
    /* Navigation */
    .nav-item { padding: 12px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #9CA3AF; transition: 0.2s; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #3B82F6; border-left: 4px solid #3B82F6; }

    /* Tables & Cards */
    .card { background: white; border-radius: 10px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
    .table-container { background: white; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #F9FAFB; padding: 12px 20px; text-align: left; font-size: 12px; color: #6B7280; text-transform: uppercase; }
    td { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 14px; }
    
    /* UI Elements */
    .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .status-pill { padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
    .pending { background: #FEF3C7; color: #92400E; }
    .approved { background: #D1FAE5; color: #065F46; }
    
    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: white; border-radius: 12px; width: 450px; padding: 30px; }
    input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div id="authSection" class="auth-screen">
    <div class="auth-card">
      <h2 style="margin-bottom: 8px;">Welcome Back</h2>
      <p style="color: #6B7280; margin-bottom: 24px; font-size: 14px;">Log in to your TGC Account</p>
      <form id="loginForm">
        <label style="font-size: 13px; font-weight: 500;">Email Address</label>
        <input type="email" id="email" placeholder="admin@tgc.com" required>
        <label style="font-size: 13px; font-weight: 500;">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
      </form>
      <p id="loginError" style="color: var(--danger); font-size: 12px; margin-top: 15px; text-align: center;" class="hidden">Invalid email or password</p>
    </div>
  </div>

  <div id="appSection" class="app-container hidden">
    <aside class="sidebar">
      <div style="padding: 30px 24px; font-size: 22px; font-weight: 700; letter-spacing: -0.5px;">TGC <span style="color: #3B82F6;">Portal</span></div>
      <nav id="navMenu">
        <div class="nav-item active" onclick="switchTab('dashboard')"><i data-lucide="layout-dashboard"></i> Dashboard</div>
        <div class="nav-item" onclick="switchTab('timesheets')"><i data-lucide="clock"></i> My Timesheets</div>
        <div id="adminOnly" class="hidden">
            <div style="padding: 20px 24px 10px; font-size: 11px; color: #4B5563; font-weight: 700; text-transform: uppercase;">Management</div>
            <div class="nav-item" onclick="switchTab('approvals')"><i data-lucide="check-square"></i> Pending Approvals</div>
        </div>
      </nav>
      <div style="position: absolute; bottom: 0; width: 100%; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
        <div id="userName" style="font-size: 14px; margin-bottom: 12px; font-weight: 500;"></div>
        <button onclick="logout()" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #EF4444; width: 100%; font-size: 13px;">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header id="viewHeader" style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
        <h1 id="viewTitle" style="font-size: 24px; font-weight: 700; color: #111827;">Dashboard Overview</h1>
        <button id="addEntryBtn" onclick="openModal()" class="btn btn-primary hidden">+ New Entry</button>
      </header>

      <div id="dashboardView">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;" id="statsGrid">
          </div>
      </div>

      <div id="listView" class="table-container hidden">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="tsModal" class="modal-backdrop hidden">
    <div class="modal">
      <h3 style="margin-bottom: 20px;">Submit Timesheet</h3>
      <form id="timesheetForm">
        <label>Date</label>
        <input type="date" id="tsDate" required>
        <label>Hours Worked</label>
        <input type="number" id="tsHours" min="1" max="24" placeholder="8" required>
        <label>Task Description</label>
        <textarea id="tsDesc" rows="3" placeholder="Describe what you worked on..." required></textarea>
        <div style="display: flex; gap: 12px; margin-top: 10px;">
          <button type="button" onclick="closeModal()" class="btn" style="background: #E5E7EB; flex: 1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">Submit Entry</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // --- APP STATE & DATABASE ---
    let currentUser = null;
    let data = JSON.parse(localStorage.getItem('tgc_data')) || {
      users: [
        { id: 1, name: 'TGC Admin', email: 'admin@tgc.com', password: 'admin123', role: 'admin' },
        { id: 2, name: 'John Employee', email: 'user@tgc.com', password: 'user123', role: 'employee' }
      ],
      entries: []
    };

    const save = () => localStorage.setItem('tgc_data', JSON.stringify(data));

    // --- AUTH LOGIC ---
    document.getElementById('loginForm').onsubmit = (e) => {
      e.preventDefault();
      const u = data.users.find(x => x.email === email.value && x.password === password.value);
      if (u) {
        currentUser = u;
        initApp();
      } else {
        document.getElementById('loginError').classList.remove('hidden');
      }
    };

    function initApp() {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('appSection').classList.remove('hidden');
      document.getElementById('userName').innerText = currentUser.name;
      if (currentUser.role === 'admin') document.getElementById('adminOnly').classList.remove('hidden');
      lucide.createIcons();
      switchTab('dashboard');
    }

    function logout() { location.reload(); }

    // --- NAVIGATION & VIEWS ---
    function switchTab(tab) {
      const views = ['dashboardView', 'listView'];
      views.forEach(v => document.getElementById(v).classList.add('hidden'));
      document.getElementById('addEntryBtn').classList.add('hidden');
      
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(i => i.classList.remove('active'));

      if (tab === 'dashboard') {
        document.getElementById('viewTitle').innerText = "Dashboard Overview";
        document.getElementById('dashboardView').classList.remove('hidden');
        renderDashboard();
      } else if (tab === 'timesheets') {
        document.getElementById('viewTitle').innerText = "My Timesheet History";
        document.getElementById('listView').classList.remove('hidden');
        document.getElementById('addEntryBtn').classList.remove('hidden');
        renderTimesheets();
      } else if (tab === 'approvals') {
        document.getElementById('viewTitle').innerText = "Management Approvals";
        document.getElementById('listView').classList.remove('hidden');
        renderApprovals();
      }
    }

    // --- DATA RENDERING ---
    function renderDashboard() {
      const myEntries = data.entries.filter(e => e.userId === currentUser.id);
      const totalHours = myEntries.reduce((sum, e) => sum + Number(e.hours), 0);
      const pending = myEntries.filter(e => e.status === 'pending').length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="card"><h3>Total Hours</h3><p style="font-size: 24px; font-weight:700; color:var(--primary)">${totalHours}</p></div>
        <div class="card"><h3>Submissions</h3><p style="font-size: 24px; font-weight:700; color:var(--success)">${myEntries.length}</p></div>
        <div class="card"><h3>Pending</h3><p style="font-size: 24px; font-weight:700; color:var(--warning)">${pending}</p></div>
      `;
    }

    function renderTimesheets() {
      const myEntries = data.entries.filter(e => e.userId === currentUser.id);
      document.getElementById('tableHead').innerHTML = `<tr><th>Date</th><th>Description</th><th>Hours</th><th>Status</th></tr>`;
      document.getElementById('tableBody').innerHTML = myEntries.map(e => `
        <tr>
          <td>${e.date}</td>
          <td>${e.desc}</td>
          <td>${e.hours}h</td>
          <td><span class="status-pill ${e.status}">${e.status}</span></td>
        </tr>
      `).join('') || `<tr><td colspan="4" style="text-align:center">No entries found</td></tr>`;
    }

    function renderApprovals() {
      const pending = data.entries.filter(e => e.status === 'pending');
      document.getElementById('tableHead').innerHTML = `<tr><th>Employee</th><th>Date</th><th>Hours</th><th>Action</th></tr>`;
      document.getElementById('tableBody').innerHTML = pending.map(e => {
        const user = data.users.find(u => u.id === e.userId);
        return `
          <tr>
            <td><b>${user.name}</b></td>
            <td>${e.date}</td>
            <td>${e.hours}h</td>
            <td>
              <button onclick="process('${e.id}', 'approved')" class="btn" style="background:var(--success); color:white; padding:5px 12px; font-size:12px">Approve</button>
            </td>
          </tr>
        `}).join('') || `<tr><td colspan="4" style="text-align:center">No pending approvals</td></tr>`;
    }

    // --- ACTIONS ---
    function openModal() { document.getElementById('tsModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('tsModal').classList.add('hidden'); }

    document.getElementById('timesheetForm').onsubmit = (e) => {
      e.preventDefault();
      data.entries.push({
        id: Date.now().toString(),
        userId: currentUser.id,
        date: document.getElementById('tsDate').value,
        hours: document.getElementById('tsHours').value,
        desc: document.getElementById('tsDesc').value,
        status: 'pending'
      });
      save();
      closeModal();
      switchTab('timesheets');
    };

    function process(id, status) {
      const idx = data.entries.findIndex(e => e.id === id);
      data.entries[idx].status = status;
      save();
      renderApprovals();
    }
  </script>
</body>
</html>
