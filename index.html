<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>TGC Global Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    .nav-active { background: #1E3A8A; color: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
    .sidebar-gradient { background: linear-gradient(180deg, #05162B 0%, #0B213F 100%); }
    
    /* Responsive Table Styles */
    @media (max-width: 768px) {
      .responsive-table thead { display: none; }
      .responsive-table tr { display: block; margin-bottom: 1rem; border: 1px solid #E2E8F0; border-radius: 12px; padding: 10px; background: white; }
      .responsive-table td { display: flex; justify-content: space-between; padding: 8px 5px; border: none; font-size: 13px; }
      .responsive-table td::before { content: attr(data-label); font-weight: 700; color: #64748B; }
      .sidebar-fixed { transform: translateX(-100%); transition: transform 0.3s ease; }
      .sidebar-open { transform: translateX(0); }
    }
  </style>
</head>
<body class="bg-[#F1F5F9] text-[#0F172A]">

  <header class="lg:hidden flex items-center justify-between p-4 bg-[#05162B] text-white sticky top-0 z-50">
    <div class="text-xl font-black italic">TGC</div>
    <button onclick="toggleSidebar()" class="p-2 bg-white/10 rounded-lg"><i data-lucide="menu"></i></button>
  </header>

  <div id="authSection" class="min-h-screen flex items-center justify-center p-6 bg-[#05162B]">
    <div class="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl animate-fade">
      <div class="text-center mb-10">
        <div class="inline-block p-4 bg-blue-50 rounded-2xl mb-4"><i data-lucide="shield-check" class="text-blue-600 w-8 h-8"></i></div>
        <h1 class="text-3xl font-extrabold text-[#05162B]">Welcome Back</h1>
        <p id="authSubtitle" class="text-slate-400 mt-2 font-medium">Please enter your credentials</p>
      </div>

      <div id="authError" class="hidden mb-6 bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold border border-red-100 text-center"></div>

      <form id="registerForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="regName" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Full Name" required>
          <input type="text" id="regPos" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Position" required>
        </div>
        <input type="email" id="regEmail" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Email Address" required>
        <input type="password" id="regPass" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password" required>
        <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Create Account</button>
        <p class="text-center text-sm font-medium mt-6 text-slate-500">Member already? <button type="button" onclick="toggleAuth(false)" class="text-blue-600 font-bold">Login</button></p>
      </form>

      <form id="loginForm" class="space-y-4 hidden">
        <input type="email" id="loginEmail" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Email" required>
        <input type="password" id="loginPass" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password" required>
        <button type="submit" class="w-full bg-[#05162B] text-white p-4 rounded-2xl font-bold hover:opacity-90 transition shadow-xl">Sign In</button>
        <p class="text-center text-sm font-medium mt-6 text-slate-500">New employee? <button type="button" onclick="toggleAuth(true)" class="text-blue-600 font-bold">Register Now</button></p>
      </form>
    </div>
  </div>

  <div id="mainApp" class="hidden flex min-h-screen overflow-hidden">
    <aside id="sidebar" class="sidebar-fixed lg:transform-none lg:relative w-72 sidebar-gradient text-slate-400 flex flex-col fixed h-full z-50">
      <div class="p-8 text-white text-2xl font-black tracking-tighter flex justify-between items-center">
        TGC <span class="text-blue-500 text-sm font-light">SYSTEMS</span>
        <button onclick="toggleSidebar()" class="lg:hidden text-slate-400"><i data-lucide="x"></i></button>
      </div>
      
      <nav class="flex-1 px-4 space-y-2 mt-4">
        <div onclick="showTab('dashboard')" id="nav-dashboard" class="nav-active p-4 flex items-center gap-4 cursor-pointer font-semibold transition-all"><i data-lucide="layout-dashboard"></i> Dashboard</div>
        <div onclick="showTab('timesheet')" id="nav-timesheet" class="p-4 flex items-center gap-4 cursor-pointer font-semibold hover:text-white transition-all"><i data-lucide="clock-3"></i> My Timesheet</div>
        
        <div id="adminMenu" class="hidden pt-10">
          <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Admin Controls</p>
          <div onclick="showTab('manage')" id="nav-manage" class="p-4 flex items-center gap-4 cursor-pointer font-semibold hover:text-white transition-all"><i data-lucide="users-round"></i> Team Directory</div>
          <div onclick="showTab('approvals')" id="nav-approvals" class="p-4 flex items-center gap-4 cursor-pointer font-semibold hover:text-white transition-all"><i data-lucide="shield-check"></i> Verifications</div>
        </div>
      </nav>

      <div class="p-6 m-4 rounded-3xl bg-white/5 border border-white/10">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm shadow-lg" id="userInitial">?</div>
          <div class="overflow-hidden">
            <p id="userName" class="text-sm font-bold text-white truncate"></p>
            <p id="userPos" class="text-[10px] uppercase font-black text-blue-400"></p>
          </div>
        </div>
        <button onclick="logout()" class="w-full flex items-center justify-center gap-2 text-xs font-bold text-red-400 hover:bg-red-500/10 p-2 rounded-xl transition"><i data-lucide="log-out" class="w-4"></i> DISCONNECT</button>
      </div>
    </aside>

    <main class="flex-1 lg:ml-0 h-screen overflow-y-auto p-4 lg:p-12">
      <header class="flex flex-col lg:flex-row lg:justify-between lg:items-end gap-4 mb-10">
        <div>
          <h2 id="viewTitle" class="text-3xl lg:text-4xl font-black text-[#05162B]">Dashboard</h2>
          <p id="viewSubtitle" class="text-slate-500 mt-1 font-medium">Monitoring your performance and logs.</p>
        </div>
        <button id="addTimeBtn" onclick="openModal()" class="hidden bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-bold shadow-xl shadow-blue-200 hover:scale-105 active:scale-95 transition flex items-center justify-center gap-2">
          <i data-lucide="plus-circle" class="w-5"></i> Log Time
        </button>
      </header>

      <div id="dashboardView" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
        <div class="glass-card p-8 rounded-[2rem] shadow-sm">
          <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 text-blue-600"><i data-lucide="hourglass"></i></div>
          <p class="text-slate-400 text-xs font-black uppercase tracking-widest">Total Hours</p>
          <h3 id="statHours" class="text-4xl font-black mt-2">0</h3>
        </div>
        <div class="glass-card p-8 rounded-[2rem] shadow-sm">
          <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 text-indigo-600"><i data-lucide="file-text"></i></div>
          <p class="text-slate-400 text-xs font-black uppercase tracking-widest">Total Logs</p>
          <h3 id="statEntries" class="text-4xl font-black mt-2">0</h3>
        </div>
        <div class="glass-card p-8 rounded-[2rem] shadow-sm">
          <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center mb-6 text-green-600"><i data-lucide="check-circle-2"></i></div>
          <p class="text-slate-400 text-xs font-black uppercase tracking-widest">Account Status</p>
          <h3 id="statStatus" class="text-2xl font-black mt-2 text-green-600 uppercase italic">Active</h3>
        </div>
      </div>

      <div id="listView" class="hidden glass-card rounded-[2rem] shadow-sm overflow-hidden">
        <table class="w-full text-left responsive-table">
          <thead class="bg-slate-50 border-b border-slate-100">
            <tr id="tableHead" class="text-[11px] font-black uppercase text-slate-400 tracking-widest"></tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modal" class="fixed inset-0 bg-[#05162B]/80 hidden flex items-center justify-center p-6 z-[60] backdrop-blur-sm">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl animate-fade">
      <h3 class="text-2xl font-black mb-8 text-[#05162B]">Log New Work Slot</h3>
      <form id="tsForm" class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Date</label>
            <input type="date" id="tsDate" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none" required>
          </div>
          <div>
            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Hours</label>
            <input type="number" id="tsHours" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none" min="1" max="24" required>
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Task Description</label>
          <textarea id="tsDesc" class="w-full p-4 bg-slate-50 border-0 rounded-2xl outline-none" rows="3" placeholder="What did you work on today?" required></textarea>
        </div>
        <div class="flex gap-4 pt-4">
          <button type="button" onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition">Cancel</button>
          <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition">Save Entry</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // --- APP DATABASE ENGINE ---
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('tgc_v3_users')) || [
        { name: "Global Administrator", email: "admin@tgc.com", pass: "admin123", role: "admin", pos: "Director", status: "active" }
    ];
    let entries = JSON.parse(localStorage.getItem('tgc_v3_entries')) || [];

    const sync = () => {
        localStorage.setItem('tgc_v3_users', JSON.stringify(users));
        localStorage.setItem('tgc_v3_entries', JSON.stringify(entries));
    };

    // --- NAVIGATION & UI ---
    function toggleAuth(isReg) {
        document.getElementById('registerForm').classList.toggle('hidden', !isReg);
        document.getElementById('loginForm').classList.toggle('hidden', isReg);
        document.getElementById('authError').classList.add('hidden');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('sidebar-open');
    }

    // --- AUTH ACTIONS ---
    document.getElementById('registerForm').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        if(users.find(u => u.email === email)) return alert("Email already exists!");
        users.push({
            name: document.getElementById('regName').value,
            pos: document.getElementById('regPos').value,
            email: email,
            pass: document.getElementById('regPass').value,
            role: 'employee',
            status: 'active'
        });
        sync();
        alert("Success! Now please login.");
        toggleAuth(false);
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const pass = document.getElementById('loginPass').value;
        const u = users.find(x => x.email === email && x.pass === pass);
        
        if(!u) return alert("Invalid credentials.");
        if(u.status === 'restricted') return alert("This account has been restricted by Admin.");
        
        currentUser = u;
        init();
    };

    function init() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userPos').innerText = currentUser.pos;
        document.getElementById('userInitial').innerText = currentUser.name.charAt(0);
        if(currentUser.role === 'admin') document.getElementById('adminMenu').classList.remove('hidden');
        lucide.createIcons();
        showTab('dashboard');
    }

    function showTab(tab) {
        const views = ['dashboardView', 'listView'];
        views.forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('addTimeBtn').classList.add('hidden');
        
        document.querySelectorAll('.nav-btn, [id^="nav-"]').forEach(b => b?.classList.remove('nav-active'));
        document.getElementById(`nav-${tab}`)?.classList.add('nav-active');

        if(tab === 'dashboard') {
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('viewTitle').innerText = "System Overview";
            updateStats();
        } else if (tab === 'timesheet') {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('addTimeBtn').classList.remove('hidden');
            document.getElementById('viewTitle').innerText = "My Timesheet";
            renderEmployeeLogs();
        } else if (tab === 'manage') {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('viewTitle').innerText = "Team Management";
            renderAdminUserList();
        } else if (tab === 'approvals') {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('viewTitle').innerText = "Pending Approvals";
            renderApprovals();
        }
        if(window.innerWidth < 1024) toggleSidebar();
    }

    function updateStats() {
        const myEntries = entries.filter(e => e.email === currentUser.email);
        document.getElementById('statHours').innerText = myEntries.reduce((a,b) => a + Number(b.hours), 0);
        document.getElementById('statEntries').innerText = myEntries.length;
    }

    // --- TABLE GENERATION ---
    function renderEmployeeLogs() {
        document.getElementById('tableHead').innerHTML = `<th class="p-6">Date</th><th class="p-6">Description</th><th class="p-6">Hours</th><th class="p-6">Status</th>`;
        const mine = entries.filter(e => e.email === currentUser.email);
        document.getElementById('tableBody').innerHTML = mine.reverse().map(e => `
            <tr class="hover:bg-slate-50 transition">
                <td class="p-6 font-bold" data-label="Date">${e.date}</td>
                <td class="p-6 text-slate-500" data-label="Task">${e.desc}</td>
                <td class="p-6 font-black" data-label="Hours">${e.hours}h</td>
                <td class="p-6" data-label="Status"><span class="status-${e.status} px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">${e.status}</span></td>
            </tr>
        `).join('') || `<tr><td colspan="4" class="p-20 text-center text-slate-400">No logs found.</td></tr>`;
    }

    function renderAdminUserList() {
        document.getElementById('tableHead').innerHTML = `<th class="p-6">Employee Info</th><th class="p-6">Position</th><th class="p-6">Total Hrs</th><th class="p-6">Action</th>`;
        document.getElementById('tableBody').innerHTML = users.filter(u => u.role !== 'admin').map(u => {
            const h = entries.filter(e => e.email === u.email).reduce((a,b) => a + Number(b.hours), 0);
            return `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-6" data-label="Employee"><div class="font-bold">${u.name}</div><div class="text-[10px] text-slate-400">${u.email}</div></td>
                    <td class="p-6" data-label="Position"><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs font-bold">${u.pos}</span></td>
                    <td class="p-6 font-black text-lg" data-label="Hours">${h}h</td>
                    <td class="p-6" data-label="Access">
                        <button onclick="toggleRestriction('${u.email}')" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase transition shadow-sm ${u.status === 'active' ? 'bg-slate-100 text-slate-600' : 'bg-red-600 text-white'}">
                            ${u.status === 'active' ? 'Limit Access' : 'Restore Account'}
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function renderApprovals() {
        document.getElementById('tableHead').innerHTML = `<th class="p-6">Staff</th><th class="p-6">Date</th><th class="p-6">Hours</th><th class="p-6 text-right">Verification</th>`;
        const pending = entries.filter(e => e.status === 'pending');
        document.getElementById('tableBody').innerHTML = pending.map(e => `
            <tr>
                <td class="p-6" data-label="Staff"><div class="font-bold">${e.name}</div><div class="text-[10px] text-slate-400">${e.desc}</div></td>
                <td class="p-6 font-medium" data-label="Date">${e.date}</td>
                <td class="p-6 font-black" data-label="Hours">${e.hours}h</td>
                <td class="p-6 text-right space-x-2" data-label="Actions">
                    <button onclick="updateLog('${e.id}', 'approved')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Approve</button>
                    <button onclick="updateLog('${e.id}', 'rejected')" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Void</button>
                </td>
            </tr>
        `).join('') || `<tr><td colspan="4" class="p-20 text-center text-slate-400">All caught up!</td></tr>`;
    }

    // --- ACTIONS ---
    function toggleRestriction(email) {
        const u = users.find(x => x.email === email);
        u.status = u.status === 'active' ? 'restricted' : 'active';
        sync(); renderAdminUserList();
    }

    function updateLog(id, s) {
        entries.find(e => e.id === id).status = s;
        sync(); renderApprovals();
    }

    document.getElementById('tsForm').onsubmit = (e) => {
        e.preventDefault();
        entries.push({
            id: Date.now().toString(),
            email: currentUser.email,
            name: currentUser.name,
            date: document.getElementById('tsDate').value,
            hours: document.getElementById('tsHours').value,
            desc: document.getElementById('tsDesc').value,
            status: 'pending'
        });
        sync(); closeModal(); showTab('timesheet');
    };

    function openModal() { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function logout() { location.reload(); }
  </script>
</body>
</html>
